include:
  # Testing the local templates
  - local: "flatpak/flatpak_ci_initiative.yml"
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/gnomeos-basic-ci@$CI_COMMIT_SHA
    inputs:
      job-name: "basic-ci-generate-tarball"
      job-stage: "Dist tarball tests"
      meson-sourcedir: "gnome-font-viewer"
      before-script: "git clone --depth=1 https://gitlab.gnome.org/gnome/gnome-font-viewer.git"
      run-tests: "no"
      clang: "disabled"
      scan-build: "disabled"
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/release-service@$CI_COMMIT_SHA
    inputs:
      job-name: "release-service-basic-ci"
      dist-job-name: "test-basic-ci-dist"
      service-url: "https://gnome-release-route-sandbox-gnome-release-service.apps.openshift.gnome.org"
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/release-service@$CI_COMMIT_SHA
    inputs:
      job-name: "release-service-flatpak"
      dist-job-name: "test-flatpak-dist"
      service-url: "https://gnome-release-route-sandbox-gnome-release-service.apps.openshift.gnome.org"

.flatpak-test-dist-setup:
  stage: "Dist tarball tests"
  variables:
    # This is different than the Upstream yaml, as it has the gnome-font-viewer subdir added in the path
    MANIFEST_PATH: "gnome-font-viewer/build-aux/flatpak/org.gnome.font-viewerDevel.json"
  before_script:
    - git clone --depth=1 https://gitlab.gnome.org/gnome/gnome-font-viewer/

# Copy from the font-viewer ci yaml
.flatpak-dist-test-common:
  extends: [".flatpak", ".flatpak-test-dist-setup"]
  variables:
    FLATPAK_MODULE: "gnome-font-viewer"
    APP_ID: "org.gnome.font-viewerDevel"
    BUNDLE: "org.gnome.font-viewerDevel.flatpak"

flatpak-generate-dist:
  extends: [".flatpak-dist-test-common"]
  needs: []
  variables:
    MESON_DIST: "1"

test-flatpak-dist:
  image: "quay.io/gnome_infrastructure/gnome-build-meta:sdk-nightly"
  tags:
    - "x86_64_v3"
  stage: "Dist tarball tests"
  needs: ["flatpak-generate-dist"]
  variables:
    FLATPAK_MODULE: "gnome-font-viewer"
  script:
    # This is the default TARBALL_ARTIFACT_PATH we recommend in the old docs and has to keep working
    # The docs mention ${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.tar.xz but we will use a wildcards instead
    - ls -lh .flatpak-builder/build/${FLATPAK_MODULE}/_flatpak_build/meson-dist/*.tar.xz
    - ls -lh public-dist/*.tar.xz*
    # Make sure we can decompress the archive
    - tar --verbose --extract --file public-dist/*.tar.xz

    # Rename the tarball for the release-service tests
    #
    # The idea is that on every commit we will possibly want to test the
    # release service template and thus we need a version that will be
    # incrementing on its own. To that end use the number of commits in the
    # branch. Additionally, the release service will only parse the gnome-like
    # version schemes. To that end we will use .alpha.0 for the flatpak tarball
    # and .alpha.1 for the basic-ci tarball
    #
    # https://gitlab.gnome.org/Infrastructure/openshift-images/gnome-release-service/-/blob/8744cfa644f6f19d718623a1892a775d99d18a03/gnome_release_service/gnome_release_system/modules/module_release.py#L63-98
    - COMMITS_TOTAL=$(git rev-list HEAD --count)
    - version="01.$COMMITS_TOTAL.alpha.0"
    - mv public-dist/gnome-font-viewer-*.tar.xz public-dist/gnome-font-viewer-$version.tar.xz
    - mv public-dist/gnome-font-viewer-*.tar.xz.sha256sum public-dist/gnome-font-viewer-$version.tar.xz.sha256sum
    - ls -al public-dist/
  artifacts:
    access: "developer"
    expire_in: "2 days"
    when: "always"
    paths:
      - "public-dist"

test-basic-ci-dist:
  image: "quay.io/gnome_infrastructure/gnome-build-meta:sdk-nightly"
  tags:
    - "x86_64_v3"
  stage: "Dist tarball tests"
  needs: ["basic-ci-generate-tarball"]
  script:
    - ls -lh public-dist/*.tar.xz*
    # Make sure we can decompress the archive
    - tar --verbose --extract --file public-dist/*.tar.xz

    # Rename the tarball for the release-service tests
    - COMMITS_TOTAL=$(git rev-list HEAD --count)
    - version="01.$COMMITS_TOTAL.alpha.1"
    - mv public-dist/gnome-font-viewer-*.tar.xz public-dist/gnome-font-viewer-$version.tar.xz
    - mv public-dist/gnome-font-viewer-*.tar.xz.sha256sum public-dist/gnome-font-viewer-$version.tar.xz.sha256sum
    - ls -al public-dist/
  artifacts:
    access: "developer"
    expire_in: "2 days"
    when: "always"
    paths:
      - "public-dist"
