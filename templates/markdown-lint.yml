spec:
  inputs:
    job-name:
      default: "markdown lint"
      description: "Name for the job"
    job-stage:
      default: "lint"
      description: "Stage to run the job"
    rumdl-version:
      default: "0.1.83"
      description: "The version of Rumdl to use."
    extra-rules:
      # We can't reference variables here cause of the
      # order in which they are declared and passed, and thus
      # our only option is to have existing + extra rules, rather
      # than default and complete override of rules
      default: []
      type: array
      description: "Extra rules to trigger the job"
---
"$[[ inputs.job-name ]]":
  stage: "$[[ inputs.job-stage ]]"
  needs: []
  image: "debian:13"
  before_script:
    - apt update --assume-yes --quiet=1
    - apt install --assume-yes --quiet=1 curl

    # Ideally we want to have pinned, pre-built images to avoid apt/curl.
    - rumdl_tag="v$[[ inputs.rumdl-version ]]"

    - mkdir -p "$CI_PROJECT_DIR/bin"
    - curl -LsSf "https://github.com/rvben/rumdl/releases/download/$rumdl_tag/rumdl-$rumdl_tag-x86_64-unknown-linux-gnu.tar.gz" | tar xzf - -C "$CI_PROJECT_DIR/bin"
  script:
    - $CI_PROJECT_DIR/bin/rumdl check --output-format gitlab $CI_PROJECT_DIR > "$CI_PROJECT_DIR/rumdl.json"
  after_script:
    - cat "$CI_PROJECT_DIR/rumdl.json"
    - |-
      echo "You can attempt to fix issues with the following command:"
      echo "rumdl check --fix ."
  rules:
    - "$[[ inputs.extra-rules ]]"
    - changes:
        paths:
          - ".rumdl.toml"
          - "*.md"
          - "**/*.md"
  artifacts:
    when: "always"
    paths:
      - "rumdl.json"
    reports:
      codequality: "rumdl.json"
