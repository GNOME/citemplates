spec:
  inputs:
    job-name:
      default: "ruff linter"
      description: "Name for the job"
    job-stage:
      default: "lint"
      description: "Stage to run the job"
    ruff-version:
      default: "0.15.12"
      description: "The version of Ruff to use. Uses the upstream ghcr.io/astral-sh/ruff image."
    extra-rules:
      # We can't reference variables here cause of the
      # order in which they are declared and passed, and thus
      # our only option is to have existing + extra rules, rather
      # than default and complete override of rules
      default: []
      type: array
      description: "Extra rules to trigger the job"
---
"$[[ inputs.job-name ]]":
  stage: "$[[ inputs.job-stage ]]"
  needs: []
  image: "ghcr.io/astral-sh/ruff:$[[ inputs.ruff-version ]]-debian-slim"
  before_script: []
  script:
    - ruff --version
    - ruff check --output-format=gitlab > "$CI_PROJECT_DIR/ruff-code-quality.json"
    - cat "$CI_PROJECT_DIR/ruff-code-quality.json"
  after_script:
    - ruff format --diff
    - |-
      echo "You can attempt to fix issues with the following commands:"
      echo "ruff format"
      echo "ruff check --fix"
  rules:
    - "$[[ inputs.extra-rules ]]"
    - changes:
        paths:
          - "pyproject.toml"
          - "ruff.toml"
          - ".ruff.toml"
          - "*.py"
          - "**/*.py"
  artifacts:
    paths:
      - "ruff-code-quality.json"
    reports:
      codequality: "ruff-code-quality.json"
