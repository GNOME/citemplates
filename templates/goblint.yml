spec:
  inputs:
    job-name:
      default: "goblint"
      description: "Name for the job"
    job-stage:
      default: "test"
      description: "Stage to run the job"
---
"$[[ inputs.job-name ]]":
  stage: $[[ inputs.job-stage ]]
  image:
    name: "ghcr.io/bilelmoussaoui/goblint:latest"
    entrypoint: [""]
  needs: []
  script:
    # Since we generate multiple reports, with multiple invocatioans, only error on the last one
    #
    # Sarif is only available in the Enterprise Edition of gitlab and its also behind a feature flag atm
    # - goblint --format sarif > goblint.sarif || true
    - goblint --format gitlab-codequality > goblint-codequality.json || true
    - goblint --format text | tee goblint.log || true
    - goblint --summary
  artifacts:
    expire_in: "1 week"
    when: "always"
    paths:
      - "goblint-codequality.json"
      - "goblint.log"
      # - "goblint.sarif"
    reports:
      codequality: "goblint-codequality.json"
      # goblint:artifacts:reports config contains unknown keys: sarif
      # sarif: "goblint.sarif"
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - "goblint.toml"
        - "**/*.c"
        - "**/*.h"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "goblint.toml"
        - "**/*.c"
        - "**/*.h"
