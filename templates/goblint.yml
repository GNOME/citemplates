spec:
  inputs:
    job-name:
      default: "gobject-linter"
      description: "Name for the job"
    job-stage:
      default: "test"
      description: "Stage to run the job"
    source-directory:
      default: "."
      description: "The source directory to run against"
    extra-rules:
      # We can't reference goblint-rules here cause of the
      # order in which they are declared and passed, and thus
      # our only option is to have existing + extra, rather
      # than default and complete override of rules
      default: []
      type: array
      description: "Extra rules to trigger the job"
---
".$[[ inputs.job-name ]]-goblint-changes": &goblint-changes
  - "goblint.toml"
  - "gobject-linter.toml"
  - "meson.build"
  - "**/meson.build"
  - "**/*.c"
  - "**/*.h"

".$[[ inputs.job-name ]]-goblint-rules": &goblint-rules
    - if: $CI_COMMIT_BRANCH
      changes:
        *goblint-changes
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        *goblint-changes

"$[[ inputs.job-name ]]":
  stage: $[[ inputs.job-stage ]]
  image:
    name: "ghcr.io/bilelmoussaoui/gobject-linter:main-f065339"
    entrypoint: [""]
  needs: []
  script:
    # Since we generate multiple reports, with multiple invocatioans, only error on the last one
    #
    # Sarif is only available in the Enterprise Edition of gitlab and its also behind a feature flag atm
    # - gobject-linter $[[ inputs.source-directory]] --format sarif > gobject-linter.sarif || true
    - gobject-linter $[[ inputs.source-directory]] --format gitlab-codequality > gobject-linter-codequality.json || true
    - gobject-linter $[[ inputs.source-directory]] --format text | tee gobject-linter.log || true
    - gobject-linter $[[ inputs.source-directory]] --summary
  artifacts:
    expire_in: "1 week"
    when: "always"
    paths:
      - "gobject-linter-codequality.json"
      - "gobject-linter.log"
      # - "gobject-linter.sarif"
    reports:
      codequality: "gobject-linter-codequality.json"
      # gobject-linter:artifacts:reports config contains unknown keys: sarif
      # sarif: "gobject-linter.sarif"
  rules:
    - "$[[ inputs.extra-rules ]]"
    - *goblint-rules
