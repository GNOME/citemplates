spec:
  inputs:
    job-name:
      default: "gobject-linter"
      description: "Name for the job"
    job-stage:
      default: "test"
      description: "Stage to run the job"
---
"$[[ inputs.job-name ]]":
  stage: $[[ inputs.job-stage ]]
  image:
    name: "ghcr.io/bilelmoussaoui/gobject-linter:main-606efd7"
    entrypoint: [""]
  needs: []
  script:
    # Since we generate multiple reports, with multiple invocatioans, only error on the last one
    #
    # Sarif is only available in the Enterprise Edition of gitlab and its also behind a feature flag atm
    # - gobject-linter --format sarif > gobject-linter.sarif || true
    - gobject-linter --format gitlab-codequality > gobject-linter-codequality.json || true
    - gobject-linter --format text | tee gobject-linter.log || true
    - gobject-linter --summary
  artifacts:
    expire_in: "1 week"
    when: "always"
    paths:
      - "gobject-linter-codequality.json"
      - "gobject-linter.log"
      # - "gobject-linter.sarif"
    reports:
      codequality: "gobject-linter-codequality.json"
      # gobject-linter:artifacts:reports config contains unknown keys: sarif
      # sarif: "gobject-linter.sarif"
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - "goblint.toml"
        - "gobject-linter.toml"
        - "**/*.c"
        - "**/*.h"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "goblint.toml"
        - "gobject-linter.toml"
        - "**/*.c"
        - "**/*.h"
